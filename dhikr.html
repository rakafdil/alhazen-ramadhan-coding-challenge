    <script src="nav.js"></script>
    <script>
        const dhikr = [
            {
                latin: "Subḥānallāh",
                arab: "سُبْحَانَ ٱللَّٰهِ",
                meaning: "Glory be to Allah"
            },
            {
                latin: "Al-ḥamdu lillāh",
                arab: "ٱلْحَمْدُ لِلَّٰهِ",
                meaning: "All praise is due to Allah"
            },
            {
                latin: "Allāhu Akbar",
                arab: "ٱللَّٰهُ أَكْبَرُ",
                meaning: "Allah is the Greatest"
            },
            {
                latin: "Astaghfirullāh",
                arab: "أَسْتَغْفِرُ ٱللَّٰه",
                meaning: "I seek forgiveness from Allah"
            }
        ];

        let index = 0;
        let count = 0;
        let target = 1;

        const countEl = document.getElementById("current-count");
        const targetInput = document.getElementById("target-value");

        const arabEl = document.getElementById("dhikr-arab");
        const latinEl = document.getElementById("dhikr-latin");
        const meanEl = document.getElementById("dhikr-mean");

        const progressEl = document.getElementById("progress-bar");
        const notifEl = document.getElementById("notif-badge");

        const prevBtn = document.getElementById("prev-btn");
        const nextBtn = document.getElementById("next-btn");
        const incBtn = document.getElementById("count-btn");
        const decBtn = document.getElementById("decrement-btn");
        const resetBtn = document.getElementById("reset-btn");

        function clamp(num, min, max) {
            return Math.min(Math.max(num, min), max);
        }

        function readTarget() {
            const value = Number(targetInput?.value);
            target = value > 0 ? value : 1;
        }
        function renderDhikr() {
            const item = dhikr[index];
            arabEl.textContent = item.arab;
            latinEl.textContent = item.latin;
            meanEl.textContent = `"${item.meaning}"`;
        }

        function renderCount() {
            if (countEl) countEl.textContent = count;

            if (!progressEl) return;

            const percent = clamp((count / target) * 100, 0, 100);
            progressEl.style.width = `${percent}%`;

            if (percent == 100) {
                notifEl.classList.remove("hidden")
            } else {
                notifEl.classList.add("hidden")
            }
        }

        function updateCount(newValue) {
            count = Math.max(0, newValue);
            renderCount();
        }

        function resetDhikr() {
            count = 0;
            renderCount();
            renderDhikr();
        }

        prevBtn?.addEventListener("click", () => {
            index = (index - 1 + dhikr.length) % dhikr.length;
            resetDhikr();
        });

        nextBtn?.addEventListener("click", () => {
            index = (index + 1) % dhikr.length;
            resetDhikr();
        });

        incBtn?.addEventListener("click", () => updateCount(count + 1));
        decBtn?.addEventListener("click", () => updateCount(count - 1));
        resetBtn?.addEventListener("click", () => updateCount(0));

        targetInput?.addEventListener("change", () => {
            readTarget();
            renderCount();
        });

        readTarget();
        renderDhikr();
        renderCount();

    </script>
</body>

</html>
